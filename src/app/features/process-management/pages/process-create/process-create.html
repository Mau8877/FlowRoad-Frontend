<div class="min-h-[calc(100vh-64px)] bg-slate-50 p-6">
  <div class="mb-6 flex flex-col gap-4 lg:flex-row lg:items-center lg:justify-between">
    <div>
      <p class="mb-1 text-xs font-extrabold uppercase tracking-[0.16em] text-fr-gold">
        Gestión de procesos
      </p>

      <h1 class="text-3xl font-extrabold text-slate-900">Iniciar nuevo proceso</h1>

      <p class="mt-2 text-sm text-slate-500">
        Selecciona el trámite correspondiente. El primer informe será atendido como una tarea del
        proceso.
      </p>
    </div>

    <div class="flex flex-wrap gap-3">
      <button
        type="button"
        class="rounded-xl border border-slate-200 bg-white px-4 py-2 text-sm font-bold text-slate-700 shadow-sm transition hover:bg-slate-100"
        (click)="goBack()"
      >
        Volver
      </button>

      <button
        type="button"
        class="rounded-xl bg-slate-900 px-4 py-2 text-sm font-bold text-white shadow-sm transition hover:bg-slate-700"
        (click)="isCreateModalOpen.set(true)"
      >
        Nuevo proceso
      </button>
    </div>
  </div>

  <app-common-table
    [title]="'Procesos registrados'"
    [subtitle]="'Listado completo de instancias de proceso, mostrando primero las más recientes'"
    [iconName]="'clipboard-list'"
    [data]="processInstances"
    [columns]="tableColumns"
    [isLoading]="isLoading()"
    (onAdd)="isCreateModalOpen.set(true)"
  >
    <ng-template #customCell let-row>
      <div class="flex items-center gap-3">
        <div
          class="flex h-10 w-10 shrink-0 items-center justify-center rounded-xl border border-slate-100 bg-slate-50 shadow-sm"
        >
          <lucide-icon name="clipboard-list" class="h-5 w-5 text-fr-gold"></lucide-icon>
        </div>

        <div class="flex flex-col text-left">
          <span class="text-sm font-bold leading-tight text-slate-800">
            {{ row.code }}
          </span>

          <div class="mt-0.5 flex items-center gap-1.5">
            <lucide-icon name="workflow" class="h-2.5 w-2.5 text-slate-300"></lucide-icon>

            <span class="text-[9px] font-medium uppercase tracking-wider text-slate-400">
              {{ row.diagramName }} · Versión {{ row.diagramVersion }}
            </span>
          </div>
        </div>
      </div>
    </ng-template>
  </app-common-table>

  <app-create-modal
    [isOpen]="isCreateModalOpen()"
    [title]="'Iniciar nuevo proceso'"
    [fields]="formFields"
    (onClose)="isCreateModalOpen.set(false)"
    (onSave)="handleSave($event)"
  >
  </app-create-modal>

  <button
    type="button"
    (click)="isCreateModalOpen.set(true)"
    class="fixed bottom-8 right-8 z-50 flex items-center justify-center rounded-full bg-slate-900 p-4 text-white shadow-2xl transition-all hover:scale-110 active:scale-95 lg:hidden"
  >
    <lucide-icon name="plus" class="h-6 w-6 text-fr-gold"></lucide-icon>
  </button>
</div>
