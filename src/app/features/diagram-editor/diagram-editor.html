<div class="flex min-h-full w-full flex-col gap-4 bg-zinc-100 p-4">
  <div class="relative">
    <app-editor-header
      [diagramName]="ui.diagramName()"
      [sessionToken]="collab.sessionToken()"
      [isConnected]="collab.isConnected()"
      (debugClick)="openDebugModal()"
      (settingsClick)="toggleSettingsPopover()"
    />

    <app-editor-settings-popover
      [isOpen]="ui.isSettingsOpen()"
      [currentName]="ui.diagramName()"
      [currentDescription]="ui.diagramDescription()"
      [currentLanes]="ui.lanes()"
      [availableDepartments]="ui.availableDepartments()"
      [isSaving]="ui.isSavingSettings()"
      (closeRequested)="closeSettingsPopover()"
      (saveRequested)="saveDiagramSettings($event)"
    />
  </div>

  <div
    class="relative h-[calc(100vh-180px)] min-h-140 overflow-auto rounded-3xl border border-black/5 bg-[#fcfcfb] shadow-[0_16px_40px_rgba(2,3,4,0.08)]"
  >
    <div
      class="relative"
      [style.width.px]="ui.canvasWidthPx()"
      [style.height.px]="ui.canvasHeightPx()"
    >
      <!-- fondo -->
      <div class="pointer-events-none absolute inset-0 z-0">
        <div class="absolute inset-0 bg-[#fcfcfb]"></div>

        <div
          class="absolute inset-0"
          style="
            background-image:
              linear-gradient(to right, rgba(15, 23, 42, 0.045) 1px, transparent 1px),
              linear-gradient(to bottom, rgba(15, 23, 42, 0.045) 1px, transparent 1px);
            background-size: 24px 24px;
            background-position: 0 0;
          "
        ></div>

        <div
          class="absolute inset-0"
          style="
            background-image:
              linear-gradient(to right, rgba(204, 158, 97, 0.1) 1px, transparent 1px),
              linear-gradient(to bottom, rgba(204, 158, 97, 0.1) 1px, transparent 1px);
            background-size: 120px 120px;
            background-position: 0 0;
          "
        ></div>
      </div>

      <!-- lanes -->
      <div class="pointer-events-none absolute inset-0 z-[1] flex">
        @for (lane of ui.lanes(); track lane.id) {
          <div
            class="relative h-full shrink-0 border-r border-black/8 bg-[rgba(255,255,255,0.18)]"
            [style.width.px]="ui.laneWidthPx"
          >
            <div
              class="flex items-center justify-center border-b border-black/8 bg-[rgba(255,255,255,0.78)] px-3 text-center text-sm font-semibold text-zinc-700 backdrop-blur-sm"
              [style.height.px]="ui.laneHeaderHeightPx"
            >
              {{ lane.departmentName }}
            </div>
          </div>
        }
      </div>

      <!-- paper -->
      <div class="absolute inset-0 z-10 overflow-hidden">
        <div #paperHost class="h-full w-full"></div>
      </div>

      <div class="pointer-events-none absolute bottom-4 right-4 z-20">
        <app-editor-minimap [cells]="collab.snapshotCells()" [title]="'Mapa'"></app-editor-minimap>
      </div>
    </div>
  </div>

  <app-editor-debug-modal
    [isOpen]="ui.isDebugOpen()"
    [logs]="collab.logs()"
    (closeRequested)="closeDebugModal()"
  />
</div>
