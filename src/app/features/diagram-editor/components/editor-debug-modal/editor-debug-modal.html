@if (isOpen) {
  <div
    class="fixed inset-0 z-50 flex items-center justify-center bg-black/50 px-4 py-6 backdrop-blur-[2px]"
    (click)="onClose()"
  >
    <div
      class="flex max-h-[85vh] w-full max-w-4xl flex-col overflow-hidden rounded-3xl border border-white/10 bg-white shadow-[0_30px_80px_rgba(2,3,4,0.28)]"
      (click)="$event.stopPropagation()"
    >
      <div
        class="flex items-center justify-between bg-[linear-gradient(135deg,#020304_0%,#2c2c31_100%)] px-6 py-5 text-white"
      >
        <div>
          <h2 class="font-(--font-display) text-3xl leading-none tracking-[0.08em]">DEBUG</h2>
          <p class="mt-2 text-xs font-semibold uppercase tracking-[0.08em] text-white/70">
            Eventos del editor en tiempo real
          </p>
        </div>

        <button
          type="button"
          (click)="onClose()"
          class="inline-flex h-10 w-10 items-center justify-center rounded-xl border border-white/10 bg-white/5 text-lg font-bold text-white transition hover:bg-white/10"
        >
          ✕
        </button>
      </div>

      <div class="flex-1 overflow-auto bg-zinc-50 p-5">
        @if (logs.length === 0) {
          <div
            class="rounded-2xl border border-dashed border-zinc-300 bg-white px-5 py-8 text-center text-sm font-medium text-zinc-500"
          >
            No hay logs todavía.
          </div>
        } @else {
          <div class="space-y-2">
            @for (item of logs; track trackByLog($index, item)) {
              <div
                class="rounded-xl border border-zinc-200 bg-white px-4 py-3 font-mono text-xs leading-relaxed text-fr-black shadow-sm"
              >
                {{ item }}
              </div>
            }
          </div>
        }
      </div>

      <div class="flex justify-end border-t border-zinc-200 bg-white px-6 py-4">
        <button
          type="button"
          (click)="onClose()"
          class="inline-flex items-center rounded-xl bg-fr-gold px-4 py-2.5 text-sm font-bold text-fr-black transition hover:brightness-105"
        >
          Cerrar
        </button>
      </div>
    </div>
  </div>
}
