<div
  class="pointer-events-none flex w-55flex-col overflow-hidden rounded-2xl border border-white/10 bg-black/85 text-white shadow-[0_16px_40px_rgba(2,3,4,0.35)] backdrop-blur-sm"
>
  <div class="flex items-center justify-between border-b border-white/10 px-4 py-3">
    <div class="font-(--font-display) text-lg leading-none tracking-[0.08em] text-white">
      {{ title }}
    </div>
    <span class="text-[10px] font-bold uppercase tracking-[0.08em] text-white/50">MINI</span>
  </div>

  <div class="relative h-35 w-55 bg-white/3">
    @if (hasContent) {
      <svg class="absolute inset-0 h-full w-full" viewBox="0 0 220 140" preserveAspectRatio="none">
        @for (link of minimapLinks; track link.id) {
          <line
            [attr.x1]="link.x1"
            [attr.y1]="link.y1"
            [attr.x2]="link.x2"
            [attr.y2]="link.y2"
            stroke="rgba(255,255,255,0.38)"
            stroke-width="1.4"
          />
        }
      </svg>

      @for (node of minimapNodes; track node.id) {
        <div
          class="absolute rounded-md border border-[rgba(204,158,97,0.55)] bg-[rgba(204,158,97,0.18)]"
          [style.left.px]="node.left"
          [style.top.px]="node.top"
          [style.width.px]="node.width"
          [style.height.px]="node.height"
          [title]="node.id"
        ></div>
      }
    } @else {
      <div class="flex h-full w-full items-center justify-center px-4 text-center">
        <span class="text-[11px] font-semibold uppercase tracking-[0.08em] text-white/45">
          Sin contenido todavía
        </span>
      </div>
    }
  </div>
</div>
