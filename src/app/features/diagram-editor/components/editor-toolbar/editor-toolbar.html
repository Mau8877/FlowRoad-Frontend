<aside class="toolbar-shell" aria-label="Herramientas del editor">
  <div class="toolbar-header">
    <button
      type="button"
      (click)="onAiClick()"
      class="tool-btn tool-btn-ai"
      title="Asistente IA"
      aria-label="Asistente IA"
      aria-pressed="false"
    >
      <lucide-icon name="sparkles" class="tool-icon"></lucide-icon>
      <span class="tool-text">Asistente IA</span>
    </button>
  </div>

  <div class="toolbar-body">
    <div class="tool-group">
      <div class="tool-group-title">Zoom</div>

      <button
        type="button"
        (click)="onZoomIn()"
        class="tool-btn"
        title="Acercar"
        aria-label="Acercar"
      >
        <lucide-icon name="zoom-in" class="tool-icon"></lucide-icon>
        <span class="tool-text">Zoom In</span>
      </button>

      <button
        type="button"
        (click)="onZoomOut()"
        class="tool-btn"
        title="Alejar"
        aria-label="Alejar"
      >
        <lucide-icon name="zoom-out" class="tool-icon"></lucide-icon>
        <span class="tool-text">Zoom Out</span>
      </button>
    </div>

    <div class="tool-divider"></div>

    <div class="tool-group">
      <div class="tool-group-title">Navegación</div>

      @for (tool of navigationTools; track tool.key) {
        <button
          type="button"
          (click)="onSelectTool(tool.key)"
          class="tool-btn"
          [class.is-active]="isToolActive(tool.key)"
          [title]="tool.label"
          [attr.aria-label]="tool.label"
          [attr.aria-pressed]="isToolActive(tool.key)"
        >
          <lucide-icon [name]="tool.icon" class="tool-icon"></lucide-icon>
          <span class="tool-text">{{ tool.label }}</span>
        </button>
      }
    </div>

    <div class="tool-divider"></div>

    <div class="tool-group">
      <div class="tool-group-title">Estructura</div>

      @for (tool of structureTools; track tool.key) {
        <button
          type="button"
          (click)="onSelectTool(tool.key)"
          class="tool-btn"
          [class.is-active]="isToolActive(tool.key)"
          [title]="tool.label"
          [attr.aria-label]="tool.label"
          [attr.aria-pressed]="isToolActive(tool.key)"
        >
          <lucide-icon [name]="tool.icon" class="tool-icon"></lucide-icon>
          <span class="tool-text">{{ tool.label }}</span>
        </button>
      }
    </div>

    @if (activeTool === 'LANE') {
      <div class="lane-box">
        <label class="lane-label" for="lane-department-select">Departamento</label>
        <select
          id="lane-department-select"
          class="lane-select"
          [ngModel]="selectedLaneDepartmentId"
          (ngModelChange)="onLaneDepartmentChange($event)"
        >
          <option value="">Selecciona...</option>

          @for (department of availableDepartments; track department.id) {
            <option [value]="department.id">
              {{ department.name }}
            </option>
          }
        </select>
        <div class="lane-help">Haz clic en el canvas para crear la lane.</div>
      </div>
    }
  </div>
</aside>
