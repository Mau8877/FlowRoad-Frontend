<app-common-table [title]="'Gestión de Cargos'" [subtitle]="'Estructura Organizacional'" [iconName]="'users'"
    [data]="cargos" [columns]="tableColumns" [isLoading]="isLoading()" (onEdit)="handleEdit($event)"
    (onDelete)="handleDelete($event)" (onAdd)="isCreateModalOpen.set(true)">

    <ng-template #customCell let-row>
        <div class="flex items-center gap-3">
            <div class="w-8 h-8 rounded bg-slate-100 flex items-center justify-center border border-slate-200">
                <lucide-icon name="users" class="w-4 h-4 text-slate-500"></lucide-icon>
            </div>
            <span class="text-sm font-bold text-slate-800">{{ row.name }}</span>
        </div>
    </ng-template>
</app-common-table>

<app-create-modal [isOpen]="isCreateModalOpen()" [title]="'Crear Nuevo Cargo'" [fields]="formFields"
    (onClose)="isCreateModalOpen.set(false)" (onSave)="handleSave($event)">
</app-create-modal>

<app-edit-modal [isOpen]="isEditModalOpen()" [title]="'Editar Cargo'" [fields]="formFields" [data]="selectedCargo()"
    (onClose)="isEditModalOpen.set(false)" (onSave)="handleUpdate($event)">
</app-edit-modal>

<app-delete-modal [isOpen]="isDeleteModalOpen()" [title]="'Desactivar Cargo'" [itemName]="selectedCargo()?.name || ''"
    [itemId]="selectedCargo()?.id || ''" (onClose)="isDeleteModalOpen.set(false)" (onConfirm)="confirmDelete()">
</app-delete-modal>

<button (click)="isCreateModalOpen.set(true)"
    class="fixed bottom-8 right-8 bg-slate-900 text-white p-4 rounded-full shadow-2xl hover:scale-110 active:scale-95 transition-all z-50 lg:hidden flex items-center justify-center">
    <lucide-icon name="plus" class="w-6 h-6 text-fr-gold"></lucide-icon>
</button>
