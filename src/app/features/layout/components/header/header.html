<header class="h-16 border-b border-slate-200 bg-white/80 backdrop-blur-md flex items-center justify-between px-8 z-40">

    <div class="flex items-center gap-4">
        <div class="h-6 w-1 bg-fr-gold rounded-full"></div>
        <h2 class="text-sm font-black uppercase tracking-[0.2em] text-fr-black">
            {{ currentSection }}
        </h2>
    </div>

    <div class="flex items-center gap-6">

        @if (authService.currentUser(); as user) {
        <div class="text-right hidden sm:block">
            <p class="text-[11px] font-black text-fr-black uppercase leading-none mb-1">
                {{ user.displayName }}
            </p>
            <p class="text-[9px] font-bold text-fr-gold uppercase tracking-widest leading-none">
                {{ user.roles[0] }}
            </p>
        </div>

        <div class="dropdown dropdown-end">
            <div tabindex="0" role="button"
                class="btn btn-ghost btn-circle avatar bg-slate-100 border border-slate-200">
                <div class="w-8 rounded-full">
                    <span class="text-fr-brown font-black flex items-center justify-center h-full">
                        {{ user.displayName.charAt(0) }}
                    </span>
                </div>
            </div>
            <ul tabindex="0"
                class="mt-3 z-1 p-2 shadow-xl menu menu-sm dropdown-content bg-white border border-slate-100 rounded-box w-52">
                <li><a class="text-slate-600 py-3">Mi Perfil</a></li>
                <li><a class="text-slate-600 py-3">Ajustes</a></li>
                <div class="divider my-1"></div>
                <li>
                    <a (click)="LOGOUT()" class="text-red-600 font-bold py-3 hover:bg-red-50">
                        Cerrar Sesión
                    </a>
                </li>
            </ul>
        </div>
        }

    </div>
</header>
