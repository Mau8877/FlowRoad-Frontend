@if (isOpen) {
<div class="fixed inset-0 z-60 flex items-center justify-center p-4">
    <div class="absolute inset-0 bg-slate-900/40 backdrop-blur-sm" (click)="close()"></div>

    <div
        class="relative bg-white w-full max-w-lg rounded-2xl shadow-2xl border border-slate-200 overflow-hidden animate-in fade-in zoom-in duration-200">

        <div class="px-6 py-4 border-b border-slate-100 flex items-center justify-between bg-slate-50/50">
            <div>
                <h3 class="text-sm font-black uppercase text-slate-900 tracking-widest">{{ title }}</h3>
                <p class="text-[10px] text-fr-gold font-bold uppercase tracking-tighter italic">ID: {{ data?.id }}</p>
            </div>
            <button (click)="close()" class="p-2 hover:bg-slate-200/50 rounded-lg text-slate-400 transition-colors">
                <lucide-icon name="x" class="w-4 h-4"></lucide-icon>
            </button>
        </div>

        <form [formGroup]="form" (ngSubmit)="submit()" class="p-6">
            <div class="grid grid-cols-2 gap-4">
                @for (field of fields; track field.name) {
                <div [class]="field.gridCols === 2 ? 'col-span-2' : 'col-span-2 md:col-span-1'">
                    <label [for]="field.name"
                        class="block text-[10px] font-black text-slate-500 uppercase tracking-widest mb-1.5 ml-1">
                        {{ field.label }}
                    </label>

                    <input [type]="field.type" [id]="field.name" [formControlName]="field.name"
                        class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-2.5 text-xs text-slate-700 focus:border-fr-gold focus:ring-4 focus:ring-fr-gold/5 outline-none transition-all shadow-sm">

                    @if (form.get(field.name)?.touched && form.get(field.name)?.invalid) {
                    <div class="flex items-center gap-1 mt-1 ml-1 text-red-500">
                        <lucide-icon name="alert-circle" class="w-3 h-3"></lucide-icon>
                        <span class="text-[9px] font-bold uppercase tracking-tighter">Campo inválido</span>
                    </div>
                    }
                </div>
                }

                @if (data?.isActive === false) {
                <div
                    class="col-span-2 mt-2 p-4 bg-amber-50 rounded-xl border border-amber-100 flex items-center justify-between">
                    <div class="flex items-center gap-3">
                        <div class="p-2 bg-amber-100 rounded-lg text-amber-600">
                            <lucide-icon name="power" class="w-4 h-4"></lucide-icon>
                        </div>
                        <div>
                            <p class="text-[10px] font-black text-amber-900 uppercase">Reactivar Registro</p>
                            <p class="text-[9px] text-amber-700 uppercase tracking-tighter font-bold">El cargo está
                                actualmente inactivo</p>
                        </div>
                    </div>
                    <label class="relative inline-flex items-center cursor-pointer">
                        <input type="checkbox" formControlName="isActive" class="sr-only peer">
                        <div
                            class="w-11 h-6 bg-slate-200 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-0.5 after:left-0.5after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-green-500">
                        </div>
                    </label>
                </div>
                }
            </div>

            <div class="mt-8 flex gap-3">
                <button type="button" (click)="close()"
                    class="flex-1 px-4 py-3 border border-slate-200 rounded-xl text-[10px] font-black uppercase tracking-[0.2em] text-slate-500 hover:bg-slate-50 transition-all">
                    Descartar
                </button>
                <button type="submit" [disabled]="form.invalid"
                    class="flex-1 px-4 py-3 bg-slate-900 text-white rounded-xl text-[10px] font-black uppercase tracking-[0.2em] hover:bg-slate-800 disabled:opacity-50 transition-all flex items-center justify-center gap-2 shadow-lg">
                    <lucide-icon name="refresh-cw" class="w-3 h-3 text-fr-gold"></lucide-icon>
                    Actualizar
                </button>
            </div>
        </form>
    </div>
</div>
}
