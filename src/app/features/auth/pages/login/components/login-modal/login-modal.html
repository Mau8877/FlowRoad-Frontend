<div class="card w-full bg-base-100 shadow-2xl border border-fr-taupe/10 backdrop-blur-md">
    <div class="card-body p-6 lg:p-10">

        <div class="mb-6">
            <h2 class="font-display text-4xl lg:text-5xl text-fr-gold tracking-wider uppercase leading-none">
                Iniciar Sesión
            </h2>
            <div class="h-1 w-10 bg-fr-brown mt-1"></div>
            <p class="font-sans text-fr-taupe text-[11px] mt-3 font-semibold uppercase tracking-wider opacity-80">
                Gestión de Trámites & Workflow para Equipos Ágiles
            </p>
        </div>

        <form [formGroup]="loginForm" (ngSubmit)="ON_SUBMIT()" class="space-y-4">

            <div class="form-control w-full">
                <label class="label py-1">
                    <span class="label-text text-fr-taupe uppercase text-[9px] font-black tracking-[0.2em]">Correo
                        Electrónico</span>
                </label>
                <input type="email" formControlName="email" placeholder="usuario@flowroad.com"
                    class="input input-bordered w-full bg-transparent border-fr-gray/30 focus:border-fr-gold text-fr-brown transition-all duration-300" />

                @if (loginForm.get('email')?.invalid && loginForm.get('email')?.touched) {
                <span class="text-fr-brown text-[9px] mt-1 font-bold uppercase italic tracking-tighter">Email no
                    válido</span>
                }
            </div>

            <div class="form-control w-full">
                <label class="label py-1">
                    <span
                        class="label-text text-fr-taupe uppercase text-[9px] font-black tracking-[0.2em]">Contraseña</span>
                </label>
                <input type="password" formControlName="password" placeholder="••••••••"
                    class="input input-bordered input-sm h-11 w-full bg-transparent border-fr-gray/30 focus:border-fr-gold text-fr-brown transition-all duration-300" />
            </div>

            @if (ERROR_MSG()) {
            <div class="text-center">
                <span class="text-fr-brown text-[10px] font-black uppercase italic tracking-widest animate-pulse">
                    {{ ERROR_MSG() }}
                </span>
            </div>
            }

            <div class="card-actions pt-2">
                <button type="submit" [disabled]="loginForm.invalid || IS_LOADING()"
                    class="btn w-full font-sans border-none text-white font-bold uppercase tracking-widest bg-fr-taupe hover:bg-fr-gold hover:text-fr-black transition-all duration-500 disabled:opacity-50">

                    @if (IS_LOADING()) {
                    <span class="loading loading-spinner loading-xs"></span>
                    PROCESANDO...
                    } @else {
                    Iniciar Sesión
                    }
                </button>
            </div>
        </form>

        <div
            class="divider before:bg-fr-taupe/10 after:bg-fr-taupe/10 text-[9px] text-fr-taupe/50 font-bold tracking-[0.3em] my-6 uppercase">
            Acceso Seguro
        </div>

        <div class="text-center">
            <p class="text-[10px] text-fr-taupe font-medium uppercase tracking-widest">
                ¿No tienes una cuenta?
                <a
                    class="text-fr-gold cursor-pointer hover:text-fr-brown transition-colors font-black ml-1">Registrarse</a>
            </p>
        </div>

    </div>
</div>
